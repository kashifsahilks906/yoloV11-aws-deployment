<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Prediction</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=Manrope:wght@500;700&display=swap");

    :root {
      --bg-top: #fff5ec;
      --bg-bottom: #eaf7ff;
      --text: #112033;
      --muted: #64748b;
      --brand-a: #ff6b4a;
      --brand-b: #ff9951;
      --accent-a: #00a9b5;
      --accent-b: #007f9d;
      --panel-border: #d5deea;
      --placeholder-bg: #edf1f5;
      --surface: rgba(255, 255, 255, 0.78);
      --shadow-lg: 0 22px 46px rgba(30, 50, 72, 0.14);
      --shadow-md: 0 10px 26px rgba(17, 32, 51, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(90rem 40rem at -10% -10%, rgba(255, 176, 102, 0.35), transparent 48%),
        radial-gradient(70rem 32rem at 105% -6%, rgba(0, 169, 181, 0.22), transparent 52%),
        linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      display: flex;
      justify-content: center;
      padding: 38px 16px 50px;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      z-index: 0;
      filter: blur(1px);
      animation: float 8s ease-in-out infinite;
    }

    body::before {
      width: 180px;
      height: 180px;
      background: rgba(255, 107, 74, 0.2);
      left: 4%;
      bottom: 10%;
    }

    body::after {
      width: 220px;
      height: 220px;
      background: rgba(0, 169, 181, 0.18);
      right: 2%;
      top: 14%;
      animation-delay: 1.2s;
    }

    .app {
      width: min(1060px, 96vw);
      margin: 0 auto;
      text-align: center;
      background: var(--surface);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 28px;
      box-shadow: var(--shadow-lg);
      padding: clamp(22px, 3.6vw, 40px);
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 56px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(90deg, var(--accent-b) 0%, var(--accent-a) 40%, var(--brand-a) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      margin: 10px auto 0;
      max-width: 720px;
      font-size: clamp(14px, 1.6vw, 18px);
      color: var(--muted);
      font-family: "Manrope", "Segoe UI", Tahoma, sans-serif;
    }

    .controls {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    input[type="file"] {
      width: min(520px, 94vw);
      font-family: "Manrope", "Segoe UI", Tahoma, sans-serif;
      font-size: 15px;
      color: #334155;
      padding: 9px;
      border: 1px solid #cfdae8;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    input[type="file"]::file-selector-button {
      border: 0;
      border-radius: 10px;
      padding: 8px 14px;
      margin-right: 12px;
      font-family: "Manrope", "Segoe UI", Tahoma, sans-serif;
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(120deg, var(--accent-b), var(--accent-a));
      cursor: pointer;
    }

    .btn-predict {
      border: 0;
      border-radius: 12px;
      padding: 12px 24px;
      min-width: 140px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.2px;
      color: #ffffff;
      background: linear-gradient(120deg, var(--brand-a) 0%, var(--brand-b) 100%);
      box-shadow: 0 10px 20px rgba(255, 107, 74, 0.3);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    .btn-predict:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 14px 26px rgba(255, 107, 74, 0.36);
      filter: saturate(1.06);
    }

    .btn-predict:active {
      transform: translateY(0);
    }

    .btn-predict:disabled {
      opacity: 0.72;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .panels {
      margin-top: clamp(28px, 5vw, 54px);
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid #d8e2ef;
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      transition: transform 0.2s ease;
    }

    .panel:hover {
      transform: translateY(-3px);
    }

    .panel h2 {
      margin: 0;
      font-size: clamp(26px, 3vw, 46px);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .image-box {
      width: min(100%, 430px);
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      border: 2px dashed var(--panel-border);
      background: #ffffff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: zoom-in;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
      background: #ffffff;
      cursor: zoom-in;
    }

    .image-box .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(20px, 1.8vw, 28px);
      color: #8da1b4;
      font-weight: 700;
      letter-spacing: 0.01em;
      user-select: none;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .image-box.original {
      background: var(--placeholder-bg);
    }

    .image-box.predicted {
      background: #f8fbff;
    }

    .hint {
      margin: 18px auto 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: "Manrope", "Segoe UI", Tahoma, sans-serif;
      font-size: 14px;
      color: #264057;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid #d5e0ed;
      border-radius: 999px;
      padding: 8px 14px;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(9, 20, 36, 0.86);
      backdrop-filter: blur(4px);
      z-index: 200;
      animation: fadeIn 0.2s ease;
    }

    .lightbox.show {
      display: flex;
    }

    .lightbox-content {
      position: relative;
      width: min(95vw, 1300px);
      max-height: 92vh;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.42);
      overflow: hidden;
      background: #0f1f33;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .lightbox-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #ebf4ff;
      padding: 12px 14px;
      background: rgba(16, 35, 56, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      font-family: "Manrope", "Segoe UI", Tahoma, sans-serif;
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    .lightbox-close {
      border: 0;
      border-radius: 10px;
      padding: 6px 10px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.14);
      font-family: "Manrope", "Segoe UI", Tahoma, sans-serif;
      font-weight: 700;
      cursor: pointer;
    }

    .lightbox-close:hover {
      background: rgba(255, 255, 255, 0.24);
    }

    .lightbox-image {
      width: 100%;
      height: min(85vh, 980px);
      object-fit: contain;
      background: #0f1f33;
    }

    body.modal-open {
      overflow: hidden;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-12px);
      }
      100% {
        transform: translateY(0px);
      }
    }

    @media (max-width: 960px) {
      .panels {
        grid-template-columns: 1fr;
      }

      .panel {
        max-width: 560px;
        margin-inline: auto;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 20px 10px 30px;
      }

      .app {
        border-radius: 18px;
        padding: 18px 14px 24px;
      }

      .controls {
        gap: 10px;
      }

      .btn-predict {
        width: min(320px, 92vw);
      }

      .panel {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Image Prediction</h1>
    <p class="subtitle">Upload an image and run your detector to compare raw input with annotated model output.</p>

    <section class="controls" aria-label="prediction controls">
      <input id="imageInput" type="file" accept="image/*" />
      <button class="btn-predict" id="predictBtn" type="button">Predict</button>
    </section>

    <section class="panels" aria-label="image panels">
      <article class="panel">
        <h2>Original Image</h2>
        <div class="image-box original" id="originalBox">
          <img id="originalPreview" alt="Original upload preview" />
          <div class="placeholder" id="originalText">Original Image</div>
        </div>
      </article>

      <article class="panel">
        <h2>Predicted Image</h2>
        <div class="image-box predicted" id="predictedBox">
          <img id="predictedPreview" alt="Predicted image preview" />
          <div class="placeholder" id="predictedText">Predicted Image</div>
        </div>
      </article>
    </section>

    <p class="hint" id="statusHint">Choose an image, then click Predict.</p>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-content">
      <div class="lightbox-header">
        <span id="lightboxTitle">Preview</span>
        <button type="button" class="lightbox-close" id="lightboxClose" aria-label="Close full screen image">Close</button>
      </div>
      <img id="lightboxImage" class="lightbox-image" alt="Full screen preview" />
    </div>
  </div>

  <script>
    const imageInput = document.getElementById("imageInput");
    const predictBtn = document.getElementById("predictBtn");
    const originalBox = document.getElementById("originalBox");
    const predictedBox = document.getElementById("predictedBox");
    const originalPreview = document.getElementById("originalPreview");
    const originalText = document.getElementById("originalText");
    const predictedPreview = document.getElementById("predictedPreview");
    const predictedText = document.getElementById("predictedText");
    const statusHint = document.getElementById("statusHint");
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightboxImage");
    const lightboxClose = document.getElementById("lightboxClose");
    const lightboxTitle = document.getElementById("lightboxTitle");

    function openLightbox(src, title) {
      if (!src) {
        return;
      }
      lightboxImage.src = src;
      lightboxTitle.textContent = title;
      lightbox.classList.add("show");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-open");
    }

    function closeLightbox() {
      lightbox.classList.remove("show");
      lightbox.setAttribute("aria-hidden", "true");
      document.body.classList.remove("modal-open");
      lightboxImage.removeAttribute("src");
    }

    originalBox.addEventListener("click", () => {
      if (originalPreview.src && originalPreview.style.display !== "none") {
        openLightbox(originalPreview.src, "Original Image");
      }
    });

    predictedBox.addEventListener("click", () => {
      if (predictedPreview.src && predictedPreview.style.display !== "none") {
        openLightbox(predictedPreview.src, "Predicted Image");
      }
    });

    lightboxClose.addEventListener("click", closeLightbox);

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && lightbox.classList.contains("show")) {
        closeLightbox();
      }
    });

    imageInput.addEventListener("change", () => {
      const file = imageInput.files && imageInput.files[0];
      if (!file) {
        originalPreview.removeAttribute("src");
        originalPreview.style.display = "none";
        originalText.style.opacity = "1";
        predictedPreview.removeAttribute("src");
        predictedPreview.style.display = "none";
        predictedText.style.opacity = "1";
        statusHint.textContent = "Choose an image, then click Predict.";
        return;
      }

      const reader = new FileReader();
      reader.onload = (event) => {
        originalPreview.src = event.target.result;
        originalPreview.style.display = "block";
        originalText.style.opacity = "0";
        predictedPreview.removeAttribute("src");
        predictedPreview.style.display = "none";
        predictedText.style.opacity = "1";
        statusHint.textContent = "Image loaded. Click Predict to run model inference.";
      };
      reader.readAsDataURL(file);
    });

    predictBtn.addEventListener("click", async () => {
      const file = imageInput.files && imageInput.files[0];
      if (!file) {
        statusHint.textContent = "Please upload an image first.";
        return;
      }

      predictBtn.disabled = true;
      statusHint.textContent = "Running inference...";

      try {
        const formData = new FormData();
        formData.append("image", file);

        const response = await fetch("/predict", {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          let message = `Request failed (${response.status})`;
          try {
            const errorData = await response.json();
            if (errorData && errorData.error) {
              message = errorData.error;
            }
          } catch (jsonError) {
            // Ignore JSON parse errors and use default message.
          }
          throw new Error(message);
        }

        const imageBlob = await response.blob();
        const predictionUrl = URL.createObjectURL(imageBlob);

        predictedPreview.src = predictionUrl;
        predictedPreview.style.display = "block";
        predictedText.style.opacity = "0";

        const detectionsHeader = response.headers.get("Detection-Results");
        if (detectionsHeader) {
          try {
            const detections = JSON.parse(detectionsHeader);
            statusHint.textContent = detections.length > 0
              ? `Prediction complete. Detections: ${detections.length}`
              : "Prediction complete. No detections found at current confidence threshold.";
          } catch (parseError) {
            statusHint.textContent = "Prediction complete.";
          }
        } else {
          statusHint.textContent = "Prediction complete.";
        }
      } catch (error) {
        statusHint.textContent = `Prediction failed: ${error.message}`;
      } finally {
        predictBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
